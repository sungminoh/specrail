name: release
on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Verify package.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version v$PKG_VERSION"
            exit 1
          fi
      - run: npm run typecheck
      - run: npm test
      - name: lint:plan (warn-only)
        run: npm run lint:plan || echo "::warning::lint:plan failed (non-blocking)"
      - run: npm run build
      - run: npm pack
      - name: Create GitHub release (RB-7 fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "Generated by .github/workflows/release.yml" \
            *.tgz
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
