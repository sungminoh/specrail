          - heading "4. 핵심 가치" [level=2] [ref=e159]
          - heading "4.1 한 문장" [level=3] [ref=e160]
          - paragraph [ref=e161]: "\"Claude Code 안에서 13단계 spec을 structured로 작성하면 hook이 자동 검증하고 대시보드가 시각화한다 — 사용자 양심 의존 제거.\""
          - heading "4.2 차별점" [level=3] [ref=e162]
          - list [ref=e163]:
            - listitem [ref=e164]:
              - strong [ref=e165]: "vs 기존 markdown:"
              - text: "structured I/O로 환각 ID 0건. hook이 self-check 자동. PAIN-4 검토 부담은 markdown rendered (GitHub·VS Code preview)로 부분 mitigate, 인터랙티브 검토는 dashboard cycle에서. (단점: Claude Code 사용자만)"
            - listitem [ref=e166]:
              - strong [ref=e167]: "vs Superpowers:"
              - text: 13 phase pre-implementation pipeline 전용 (Superpowers는 implementation skills). Phase 13에서 Superpowers 패턴 차용.
            - listitem [ref=e168]:
              - strong [ref=e169]: "vs OpenSpec:"
              - text: capability 단위 차용 + 13 phase 추가 + Claude Code 통합.
            - listitem [ref=e170]:
              - strong [ref=e171]: "vs 일반 PRD template:"
              - text: template 아닌 enforce하는 도구.
          - heading "4.3 First-Principles Insight" [level=3] [ref=e172]
          - paragraph [ref=e173]: "기존 접근: \"사용자 양심 + LLM 자율\" → 약점은 양심·기억·grep 실행 의존."
          - paragraph [ref=e174]:
            - text: "핵심 통찰:"
            - strong [ref=e175]: Spec discipline은 도구로 강제할 때 진짜 작동.
            - text: 사용자가 잊어도, LLM이 무시해도, 도구가 차단. 양심·기억은 fail-prone, 도구는 deterministic.
          - paragraph [ref=e176]: "Conventional 접근 (PRD template Notion에 채움): 사용자가 template 채울 의지 있어야. specrail: 채워야만 다음 진행 가능 (HARD-GATE 도구로 enforce)."
